name: BoozeBoard — Build & Deploy

on:
  push:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sylvaiinn/boozeboard

jobs:
  # ── Job 1 : build + push (GitHub runner, accès internet) ──────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ── Job 2 : deploy (self-hosted runner sur VM rebond Windows) ─────────────
  deploy:
    runs-on: self-hosted
    needs: build

    steps:
      - name: Deploy to K3s
        shell: cmd
        run: |
          kubectl set image deployment/boozeboard boozeboard=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} -n boozeboard
          kubectl rollout status deployment/boozeboard -n boozeboard --timeout=120s
